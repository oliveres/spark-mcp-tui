name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Build spark-mcp wheel
        working-directory: spark-mcp
        run: uv build
      - name: Build spark-tui wheel
        working-directory: spark-tui
        run: uv build
      - name: Publish spark-mcp to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: spark-mcp/dist
      - name: Publish spark-tui to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: spark-tui/dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            spark-mcp/dist/*
            spark-tui/dist/*
