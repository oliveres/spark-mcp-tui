recipe_version: "1"
name: solo-single-gpu
description: Template for a small model running on a single DGX Spark node
model: REPLACE_ME/REPLACE_ME
cluster_only: false
solo_only: true
container: vllm-node-tf5
build_args: ["--tf5"]
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 32768
command: |
  vllm serve REPLACE_ME/REPLACE_ME \
    --max-model-len {max_model_len} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization}
