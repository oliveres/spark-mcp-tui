recipe_version: "1"
name: glm-4.7-flash-awq
description: GLM-4.7-Flash AWQ with GLM tool-calling parser enabled
model: cyankiwi/GLM-4.7-Flash-AWQ
cluster_only: false
solo_only: false
container: vllm-node-tf5
build_args: ["--tf5"]
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.85
  max_model_len: 65536
command: |
  vllm serve cyankiwi/GLM-4.7-Flash-AWQ \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --tool-call-parser glm47 \
    --enable-auto-tool-choice \
    --quantization awq
