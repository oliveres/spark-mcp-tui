recipe_version: "1"
name: moe-awq
description: Mixture-of-experts model with AWQ quantization template
model: REPLACE_ME/REPLACE_ME-AWQ
cluster_only: false
solo_only: false
container: vllm-node-tf5
build_args: ["--tf5", "--mxfp4"]
mods: []
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.85
  max_model_len: 32768
command: |
  vllm serve REPLACE_ME/REPLACE_ME-AWQ \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --quantization awq
